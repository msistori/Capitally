# Evita conflitti di porta durante i test
server.port=0

# Valori minimi necessari a far partire il context
capitally.sas.issuer=http://localhost:9000
capitally.app.base-url=http://localhost:8080

# Client "fittizio" per i test (non usato end-to-end, ma richiesto dal bean)
capitally.sas.client.id=test-bff
capitally.sas.client.secret=test-secret
capitally.sas.client.redirect-uri=${capitally.app.base-url}/login/oauth2/code/capitally
capitally.sas.client.post-logout-uri=${capitally.app.base-url}/
capitally.sas.client.scopes=openid,profile,email
