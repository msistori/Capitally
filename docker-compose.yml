name: capitally

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  capitally-backend:
    build:
      context: ./backend/capitally-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      SPRING_PROFILES_ACTIVE: "dev"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      JWT_SECRET: "${JWT_SECRET}"
      DEV_USERS_0_USERNAME: "demo"
      DEV_USERS_0_EMAIL: "demo@capitally.local"
      DEV_USERS_0_PASSWORD: "${DEMO_PASSWORD}"
      DEV_USERS_0_ROLES_0: "USER"
      DEV_USERS_0_ROLES_1: "DEMO"
      DEV_USERS_0_ENABLED: "true"
      DEV_USERS_1_USERNAME: "admin"
      DEV_USERS_1_EMAIL: "admin@capitally.local"
      DEV_USERS_1_PASSWORD: "${ADMIN_PASSWORD}"
      DEV_USERS_1_ROLES_0: "ADMIN"
      DEV_USERS_1_ENABLED: "true"
      POSTHOG_API_KEY: "${POSTHOG_API_KEY}"
      POSTHOG_HOST: "${POSTHOG_HOST}"
      POSTHOG_FRONTEND_ENABLED: "${POSTHOG_FRONTEND_ENABLED}"
      POSTHOG_SERVER_ENABLED: "${POSTHOG_SERVER_ENABLED}"
      POSTHOG_SESSION_REPLAY_ENABLED: "${POSTHOG_SESSION_REPLAY_ENABLED}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM: "${RESEND_FROM}"
      RESEND_HOST: "${RESEND_HOST}"
      RESEND_LOGO_URL: "${RESEND_LOGO_URL}"
      RESEND_FORGOT_PASSWORD_DAILY_LIMIT: "${RESEND_FORGOT_PASSWORD_DAILY_LIMIT}"
      RESEND_FORGOT_PASSWORD_MONTHLY_LIMIT: "${RESEND_FORGOT_PASSWORD_MONTHLY_LIMIT}"
    ports:
      - "${BACKEND_PORT}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        BUILD_CONFIGURATION: "${FRONTEND_BUILD_CONFIGURATION}"
    restart: unless-stopped
    depends_on:
      capitally-backend:
        condition: service_started
    environment:
      BACKEND_URL: "http://capitally-backend:8080"
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  postgres-data:
