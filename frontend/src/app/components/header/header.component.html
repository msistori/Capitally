<header [ngClass]="hideLogout ? 'header login-header' : 'header'">
  <div class="logo-container">
    <img src="assets/logo_white.svg" alt="Capitally logo" class="logo" />
    <span class="title">Capitally</span>
  </div>

  <div class="header-options">
    <button *ngFor="let lang of availableLanguages" (click)="changeLanguage(lang)"
      [class.active]="currentLang === lang">
      {{ lang === 'it' ? 'IT' : 'EN' }}
    </button>
    <button *ngIf="!hideLogout" class="logout-btn" (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</header>
