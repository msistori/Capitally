<footer class="footer" role="contentinfo">

  <nav class="footer-actions" aria-label="Footer navigation">

    <app-footer-action [icon]="'home'" [label]="'NAV.HOME' | translate" [active]="isRoute('/dashboard')" (action)="goToHome()"></app-footer-action>

    <app-footer-action [icon]="'account_balance'" [label]="'NAV.ACCOUNTS' | translate" [active]="isRoute('/accounts')" (action)="goToAccounts()"></app-footer-action>

    <app-footer-action [icon]="'add'" [label]="'NAV.ADD_TRANSACTION' | translate" (action)="openTransactionModal()"
      [disabled]="transactionDialogOpen"></app-footer-action>

    <app-footer-action [icon]="'list_alt'" [label]="'NAV.SUMMARY' | translate" [active]="isRoute('/summary')" (action)="goToSummary()"></app-footer-action>

    <app-footer-action [icon]="'settings'" [label]="'NAV.SETTINGS' | translate" (action)="openSettingsModal()"
      [disabled]="settingsDialogOpen"></app-footer-action>

  </nav>
</footer>
