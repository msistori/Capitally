<footer class="footer" role="contentinfo">

  <nav class="footer-actions" aria-label="Footer navigation">

    <app-footer-action [icon]="'home'" [label]="'Home'" [active]="isRoute('/dashboard')" (action)="goToHome()"></app-footer-action>

    <app-footer-action [icon]="'account_balance'" [label]="'Accounts'" [active]="isRoute('/accounts')" (action)="goToAccounts()"></app-footer-action>

    <app-footer-action [icon]="'add'" [label]="'Add transaction'" (action)="openTransactionModal()"
      [disabled]="transactionDialogOpen"></app-footer-action>

    <app-footer-action [icon]="'list_alt'" [label]="'Summary'" (action)="goToSummary()"></app-footer-action>

    <app-footer-action [icon]="'settings'" [label]="'Settings'" (action)="openSettingsModal()"
      [disabled]="settingsDialogOpen"></app-footer-action>

  </nav>
</footer>
