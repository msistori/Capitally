<main class="dashboard-container">
  <!-- balance-summary -->
  <app-balance-summary
    [totalBalance]="overviewData.totalBalancePerCurrency ? overviewData.totalBalancePerCurrency : {}">
  </app-balance-summary>

  <!-- monthly-summary -->
  <app-monthly-summary
    *ngIf="overviewData"
    [income]="overviewData.totalIncomeThisMonth ? overviewData.totalIncomeThisMonth : {}"
    [expense]="overviewData.totalExpenseThisMonth ? overviewData.totalExpenseThisMonth : {}">
  </app-monthly-summary>

  <!-- recent-transactions -->
  <app-recent-transactions></app-recent-transactions>

  <!-- balance trend -->
  <app-balance-trend [items]="yearlyBalance"></app-balance-trend>

  <!-- income - expense breakdown -->
   <app-income-expense-breakdown [items]="incomeExpenseBreakdownData" (monthChange)="onMonthChange($event)"></app-income-expense-breakdown>
</main>
